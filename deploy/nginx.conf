# Drop into /etc/nginx/sites-available/<your-domain>, replace belts.jollyweb.co
# with your real hostname, symlink into sites-enabled, reload nginx, then run:
#   sudo certbot --nginx -d <your-domain> --key-type ecdsa
# (Or `certbot certonly` if you'd rather edit by hand.)
#
# If your DNS is proxied through Cloudflare, gray-cloud the record during
# initial issuance, then re-orange it after the cert is in place.

server {
    listen 80;
    listen [::]:80;
    server_name belts.jollyweb.co;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name belts.jollyweb.co;

    ssl_certificate     /etc/letsencrypt/live/belts.jollyweb.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/belts.jollyweb.co/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        client_max_body_size 25m;

        # Shopify sends large headers for embedded apps
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }
}
