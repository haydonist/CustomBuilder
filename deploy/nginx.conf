# Drop into /etc/nginx/sites-available/belts.conf, symlink into sites-enabled,
# then run: sudo certbot --nginx -d belts.example.com
# After certbot rewrites the file, the listen 80 block becomes a redirect to 443.

server {
    listen 80;
    listen [::]:80;
    server_name belts.example.com;

    # Shopify-embedded apps need streamy SSE/websocket-friendly proxying.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        client_max_body_size 25m;
    }
}
